name: Release Please

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Create Release
    runs-on: [self-hosted, Linux, X64]

    steps:
      - uses: googleapis/release-please-action@v4
        with:
          # PAT required so that the release event triggers downstream
          # workflows (docker-publish). GITHUB_TOKEN cannot trigger
          # new workflow runs.
          token: ${{ secrets.PAT_TOKEN }}
